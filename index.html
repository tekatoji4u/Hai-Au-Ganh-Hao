<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hải Âu Gành Hào</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#1a1035; touch-action:manipulation;
    font-family:-apple-system, "Segoe UI", Roboto, sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; width:100%; height:100%; }
  #credit { position:fixed; bottom:6px; right:10px; color:rgba(255,255,255,.45);
    font-size:11px; letter-spacing:.5px; pointer-events:none; z-index:5; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="credit">Thiết kế bởi Hải Đăng ✦</div>
<script>
(() => {
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ------- Trạng thái game -------
  const S = { READY:0, PLAY:1, DEAD:2 };
  let state = S.READY;
  let score = 0, best = 0;
  let t = 0; // frame đếm

  // Chim (hải âu)
  const bird = { x:0, y:0, vy:0, r:16, wing:0 };
  const GRAV = 0.45, FLAP = -7.6, MAXVY = 11;

  // Chướng ngại: cột hải đăng
  let pipes = [];
  const GAP_BASE = 175, PIPE_W = 64, SPEED_BASE = 2.6, SPACING = 240;

  // Sóng biển & mây
  let waveT = 0;
  const clouds = Array.from({length:5}, (_,i)=>({
    x: Math.random(), y: 0.08 + Math.random()*0.25, s: 0.5+Math.random(), w: 60+Math.random()*70
  }));

  function reset() {
    bird.x = W * 0.28; bird.y = H * 0.45; bird.vy = 0;
    pipes = []; score = 0; t = 0;
  }
  reset();

  function spawnPipe(x) {
    const gap = Math.max(140, GAP_BASE - score * 1.2);
    const margin = 90;
    const gy = margin + Math.random() * (H - margin*2 - gap - H*0.14);
    pipes.push({ x, gy, gap, passed:false });
  }

  function flap() {
    if (state === S.READY) { state = S.PLAY; spawnPipe(W + 60); }
    if (state === S.PLAY) { bird.vy = FLAP; bird.wing = 8; }
    else if (state === S.DEAD && deadCooldown <= 0) { reset(); state = S.READY; }
  }
  let deadCooldown = 0;

  cv.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
  window.addEventListener('keydown', e => { if (e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); flap(); }});

  // ------- Vẽ -------
  function skyGrad() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#2b1b5e');
    g.addColorStop(0.42, '#7a3b8f');
    g.addColorStop(0.68, '#e8734a');
    g.addColorStop(0.85, '#f9b558');
    g.addColorStop(1, '#1e3a5f');
    return g;
  }

  function drawBackground() {
    ctx.fillStyle = skyGrad();
    ctx.fillRect(0,0,W,H);

    // Mặt trời lặn
    const sunY = H*0.72;
    const sg = ctx.createRadialGradient(W*0.5, sunY, 5, W*0.5, sunY, 90);
    sg.addColorStop(0, 'rgba(255,240,200,0.95)');
    sg.addColorStop(0.4, 'rgba(255,190,110,0.55)');
    sg.addColorStop(1, 'rgba(255,190,110,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(W*0.5, sunY, 90, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe9c2';
    ctx.beginPath(); ctx.arc(W*0.5, sunY, 34, 0, Math.PI*2); ctx.fill();

    // Mây trôi
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    clouds.forEach(c => {
      c.x -= 0.0003 * c.s;
      if (c.x < -0.2) c.x = 1.2;
      const cx = c.x * W, cy = c.y * H;
      ctx.beginPath();
      ctx.ellipse(cx, cy, c.w, c.w*0.32, 0, 0, Math.PI*2);
      ctx.ellipse(cx + c.w*0.5, cy + 6, c.w*0.6, c.w*0.24, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Biển
    const seaTop = H * 0.86;
    const sea = ctx.createLinearGradient(0, seaTop, 0, H);
    sea.addColorStop(0, '#2f5d82');
    sea.addColorStop(1, '#132a44');
    ctx.fillStyle = sea;
    ctx.fillRect(0, seaTop, W, H - seaTop);

    // Sóng
    waveT += 0.02;
    for (let l = 0; l < 3; l++) {
      ctx.beginPath();
      const baseY = seaTop + 8 + l*14;
      ctx.moveTo(0, baseY);
      for (let x = 0; x <= W; x += 12) {
        ctx.lineTo(x, baseY + Math.sin(x*0.02 + waveT*(1+l*0.4) + l*2) * 4);
      }
      ctx.strokeStyle = `rgba(255,220,170,${0.18 - l*0.05})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    // Vệt nắng phản chiếu
    ctx.fillStyle = 'rgba(255,200,120,0.15)';
    ctx.fillRect(W*0.5 - 26, seaTop, 52, H - seaTop);
  }

  function drawLighthouse(p) {
    // Cột trên (từ trần xuống) và cột dưới (từ biển lên) — kiểu hải đăng sọc đỏ trắng
    drawTower(p.x, 0, p.gy, true);
    drawTower(p.x, p.gy + p.gap, H - (p.gy + p.gap), false);
  }

  function drawTower(x, y, h, fromTop) {
    if (h <= 0) return;
    const w = PIPE_W;
    // Thân sọc
    const stripeH = 26;
    for (let i = 0; i*stripeH < h; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#d64541' : '#f5ecdd';
      const sy = y + i*stripeH;
      ctx.fillRect(x, sy, w, Math.min(stripeH, y + h - sy));
    }
    // Viền tối 2 bên tạo khối
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(x, y, 8, h);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x + w - 8, y, 8, h);
    // Đầu đèn ở miệng khe
    const capY = fromTop ? y + h - 16 : y;
    ctx.fillStyle = '#3a3f52';
    ctx.fillRect(x - 6, capY, w + 12, 16);
    // Đèn vàng nhấp nháy
    const glow = 0.5 + 0.5*Math.sin(t*0.1 + x*0.05);
    ctx.fillStyle = `rgba(255,214,90,${0.55 + glow*0.45})`;
    const ly = fromTop ? capY + 8 : capY + 8;
    ctx.beginPath(); ctx.arc(x + w/2, ly, 5 + glow*2, 0, Math.PI*2); ctx.fill();
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    const tilt = Math.max(-0.5, Math.min(1.1, bird.vy * 0.07));
    ctx.rotate(state === S.DEAD ? 1.2 : tilt);

    // Thân hải âu
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 12, 0, 0, Math.PI*2);
    ctx.fill();
    // Lưng xám
    ctx.fillStyle = '#cfd8e3';
    ctx.beginPath();
    ctx.ellipse(-3, -4, 13, 7, 0, Math.PI, Math.PI*2);
    ctx.fill();
    // Cánh vỗ
    if (bird.wing > 0) bird.wing--;
    const wingUp = bird.wing > 4 || (state !== S.PLAY && Math.sin(t*0.15) > 0);
    ctx.fillStyle = '#aab7c4';
    ctx.beginPath();
    if (wingUp) ctx.ellipse(-2, -8, 12, 6, -0.5, 0, Math.PI*2);
    else ctx.ellipse(-2, 6, 12, 6, 0.5, 0, Math.PI*2);
    ctx.fill();
    // Đuôi
    ctx.fillStyle = '#e8edf2';
    ctx.beginPath();
    ctx.moveTo(-16, -2); ctx.lineTo(-26, -6); ctx.lineTo(-26, 4); ctx.closePath();
    ctx.fill();
    // Mỏ cam
    ctx.fillStyle = '#f5a623';
    ctx.beginPath();
    ctx.moveTo(15, -2); ctx.lineTo(26, 1); ctx.lineTo(15, 4); ctx.closePath();
    ctx.fill();
    // Mắt
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(9, -4, 2.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawScore() {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.font = '700 52px -apple-system, sans-serif';
    ctx.fillText(score, W/2 + 2, 82);
    ctx.fillStyle = '#fff';
    ctx.fillText(score, W/2, 80);
  }

  function drawReady() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '800 34px -apple-system, sans-serif';
    ctx.fillText('HẢI ÂU GÀNH HÀO', W/2, H*0.3);
    ctx.font = '500 17px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('Chạm màn hình để bay 🕊️', W/2, H*0.3 + 34);
    ctx.fillText('Né các cột hải đăng nhé!', W/2, H*0.3 + 60);
    // Nhấp nháy
    if (Math.sin(t*0.08) > 0) {
      ctx.font = '600 15px -apple-system, sans-serif';
      ctx.fillText('▲ CHẠM ĐỂ BẮT ĐẦU ▲', W/2, H*0.62);
    }
  }

  function drawDead() {
    ctx.fillStyle = 'rgba(20,10,40,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd65a';
    ctx.font = '800 40px -apple-system, sans-serif';
    ctx.fillText('GAME OVER', W/2, H*0.36);
    ctx.fillStyle = '#fff';
    ctx.font = '600 22px -apple-system, sans-serif';
    ctx.fillText('Điểm: ' + score, W/2, H*0.36 + 46);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '500 17px -apple-system, sans-serif';
    ctx.fillText('Kỷ lục: ' + best, W/2, H*0.36 + 76);
    if (deadCooldown <= 0 && Math.sin(t*0.08) > 0) {
      ctx.fillText('Chạm để chơi lại', W/2, H*0.36 + 120);
    }
  }

  function die() {
    state = S.DEAD;
    deadCooldown = 30;
    if (score > best) best = score;
  }

  // ------- Vòng lặp -------
  function update() {
    t++;
    if (state === S.READY) {
      bird.y = H*0.45 + Math.sin(t*0.06) * 10;
    }
    if (state === S.PLAY) {
      bird.vy = Math.min(bird.vy + GRAV, MAXVY);
      bird.y += bird.vy;

      const speed = SPEED_BASE + Math.min(2, score * 0.05);
      pipes.forEach(p => p.x -= speed);
      // Sinh cột mới
      if (pipes.length === 0 || pipes[pipes.length-1].x < W - SPACING) {
        spawnPipe(W + 20);
      }
      pipes = pipes.filter(p => p.x + PIPE_W > -20);

      // Va chạm & điểm
      const seaTop = H * 0.86;
      if (bird.y + bird.r > seaTop || bird.y - bird.r < 0) die();
      for (const p of pipes) {
        if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W) {
          if (bird.y - bird.r < p.gy || bird.y + bird.r > p.gy + p.gap) { die(); break; }
        }
        if (!p.passed && p.x + PIPE_W < bird.x) { p.passed = true; score++; }
      }
    }
    if (state === S.DEAD) {
      deadCooldown--;
      // Chim rơi xuống biển
      if (bird.y < H*0.86 - 10) {
        bird.vy = Math.min(bird.vy + GRAV, MAXVY);
        bird.y += bird.vy;
      }
    }
  }

  function render() {
    drawBackground();
    pipes.forEach(drawLighthouse);
    drawBird();
    if (state === S.READY) drawReady();
    if (state === S.PLAY) drawScore();
    if (state === S.DEAD) drawDead();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
